<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="./assets/fonts/fonts.css">
<link rel="stylesheet" href="./assets/slides.css">
</head>
<body>
  <div class="ig-frame">
    <div class="ig-pad">
      <p class="ig-eyebrow">{{eyebrow}}</p>
      <h1 class="serif" style="font-weight:600;font-size:{{headlineSize}}px;line-height:1.05;letter-spacing:-1.4px;margin:auto 0 0;color:var(--zj-text);">{{headline}}</h1>
      <p style="font-size:38px;line-height:1.35;font-weight:400;color:var(--zj-text-secondary);margin:32px 0 auto;max-width:800px;">{{subtitle}}</p>
      <div class="ig-footer">
        <span>{{handle}}</span>
        <span style="color:var(--zj-champagne-text);font-weight:600;">{{footerRight}}</span>
      </div>
    </div>
  </div>
</body>
</html>
