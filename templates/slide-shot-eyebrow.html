<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="./assets/fonts/fonts.css">
<link rel="stylesheet" href="./assets/slides.css">
</head>
<body>
  <div class="ig-frame">
    <div class="ig-pad">
      <p class="ig-eyebrow">{{eyebrow}}</p>
      <h2 style="font-size:48px;font-weight:600;line-height:1.14;letter-spacing:-0.5px;margin:20px 0 40px;color:var(--zj-text);max-width:860px;">{{headline}}</h2>
      <div class="shot-frame">
        <div class="shot-bar"><span class="shot-dot"></span><span class="shot-dot"></span><span class="shot-dot"></span></div>
        <div class="shot-body" style="{{shotStyle}}"><div class="placeholder">{{shotPlaceholder}}</div></div>
      </div>
      <div class="ig-footer">
        <span>{{handle}}</span>
        <span class="site">{{site}}</span>
      </div>
    </div>
  </div>
</body>
</html>
