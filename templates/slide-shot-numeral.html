<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="./assets/fonts/fonts.css">
<link rel="stylesheet" href="./assets/slides.css">
</head>
<body>
  <div class="ig-frame">
    <div class="ig-pad">
      <div style="display:flex;align-items:baseline;gap:22px;">
        <span class="serif num" style="font-size:60px;font-weight:600;color:var(--zj-champagne);">{{numeral}}</span>
        <h2 style="font-size:46px;font-weight:600;line-height:1.12;letter-spacing:-0.5px;margin:0 0 34px;color:var(--zj-text);max-width:760px;">{{headline}}</h2>
      </div>
      <div class="shot-frame">
        <div class="shot-bar"><span class="shot-dot"></span><span class="shot-dot"></span><span class="shot-dot"></span></div>
        <div class="shot-body" style="{{shotStyle}}"><div class="placeholder">{{shotPlaceholder}}</div></div>
      </div>
      <div class="ig-footer">
        <span>{{handle}}</span>
        <span class="site">{{site}}</span>
      </div>
    </div>
  </div>
</body>
</html>
