<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="./assets/fonts/fonts.css">
<link rel="stylesheet" href="./assets/slides.css">
</head>
<body>
  <div class="ig-frame dark">
    <div class="ig-pad">
      <p class="ig-eyebrow" style="color:rgba(255,255,255,0.68);">{{eyebrow}}</p>
      <h1 class="serif" style="font-weight:600;font-size:{{headlineSize}}px;line-height:1.07;letter-spacing:-1px;margin:auto 0 0;color:#FFFFFF;">{{headline}}</h1>
      <p style="font-size:34px;line-height:1.4;font-weight:400;color:rgba(255,255,255,0.78);margin:32px 0 44px;max-width:760px;">{{body}}</p>
      <span style="display:inline-flex;align-self:flex-start;align-items:center;padding:26px 48px;border-radius:999px;background:#FFFFFF;color:var(--zj-action);font-size:32px;font-weight:600;margin-bottom:auto;">{{button}}</span>
      <div class="ig-footer" style="border-top-color:rgba(255,255,255,0.2);color:rgba(255,255,255,0.7);">
        <span>{{handle}}</span>
        <span style="color:#FFFFFF;font-weight:600;">✦</span>
      </div>
    </div>
  </div>
</body>
</html>
